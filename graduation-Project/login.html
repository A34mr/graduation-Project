<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Dent AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <i class="fas fa-tooth"></i> Dent AI
            </a>
            <div class="menu-toggle" id="mobile-menu">
                <i class="fas fa-bars"></i>
            </div>
            <ul class="nav-menu" id="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#about">About Us</a></li>
                <li><a href="index.html#services">Services</a></li>
                <li><a href="search-clinics.html">Search Clinics</a></li>
            </ul>
        </div>
    </nav>

    <!-- Login Container -->
    <div class="auth-container">
        <div class="auth-left">
            <div style="position:absolute; top:-60; left:-60; width:220px; height:220px; border-radius:50%; background:rgba(255,255,255,0.07);"></div>
            <div style="position:absolute; bottom:-80; right:-60; width:300px; height:300px; border-radius:50%; background:rgba(255,255,255,0.07);"></div>
            <div style="z-index:1; text-align:center;">
                <div style="font-size:40px; margin-bottom:12px;">🦷</div>
                <div style="font-size:28px; font-weight:800; letter-spacing:1px; margin-bottom:12px;">Dent AI</div>
                <div style="font-size:18px; font-style:italic; font-weight:300; opacity:0.92; line-height:1.6; margin-bottom:36px;">"Your smile, our responsibility."</div>
                <div style="width:100%; height:350px; background:rgba(255,255,255,0.1); border-radius:20px; display:flex; align-items:center; justify-content:center; margin-top:24px;">
                    <i class="fas fa-tooth" style="font-size:100px; opacity:0.3;"></i>
                </div>
            </div>
        </div>
        <div class="auth-right">
            <div class="auth-form">
                <h2>Welcome back 👋</h2>
                <p style="color:#7a8fa6; margin-bottom:30px;">Sign in to your account to continue</p>

                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label>Email or Username</label>
                        <input type="text" id="identifier" placeholder="Enter your email or username" required>
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <div style="position:relative;">
                            <input type="password" id="password" placeholder="Enter your password" required>
                            <button type="button" onclick="togglePassword()" style="position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; font-size:18px; color:#7a8fa6;">
                                <i class="fas fa-eye" id="eyeIcon"></i>
                            </button>
                        </div>
                    </div>

                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:28px; margin-top:12px;">
                        <label style="display:flex; align-items:center; gap:8px; font-size:14px; color:#3a5068; cursor:pointer;">
                            <input type="checkbox" style="accent-color:#1d6fa4; width:16px; height:16px;">
                            Remember me
                        </label>
                        <a href="#" style="font-size:14px; color:#1d6fa4; font-weight:600;">Forgot Password?</a>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width:100%; padding:14px; border-radius:12px; background:linear-gradient(90deg, #1d6fa4, #2196f3);">
                        Login →
                    </button>
                </form>

                <p class="auth-footer">
                    Don't have an account? <a href="signup.html">Sign Up</a>
                </p>

                <div style="margin-top:24px; text-align:center;">
                    <p style="font-size:13px; color:#7a8fa6; margin-bottom:12px;">Or login as demo:</p>
                    <div style="display:flex; gap:10px; flex-wrap:wrap;">
                        <button onclick="demoLogin('patient')" style="flex:1; padding:10px; border:1px solid #1d6fa4; background:white; color:#1d6fa4; border-radius:8px; cursor:pointer; font-size:13px;">Patient</button>
                        <button onclick="demoLogin('doctor')" style="flex:1; padding:10px; border:1px solid #10b981; background:white; color:#10b981; border-radius:8px; cursor:pointer; font-size:13px;">Doctor</button>
                        <button onclick="demoLogin('clinic')" style="flex:1; padding:10px; border:1px solid #8b5cf6; background:white; color:#8b5cf6; border-radius:8px; cursor:pointer; font-size:13px;">Clinic</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer" style="margin-top:0;">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 Dent AI. Egyptian E-Learning University Graduation Project.</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            }
        }

        function handleLogin(e) {
            e.preventDefault();
            const identifier = document.getElementById('identifier').value;
            // For demo purposes, redirect based on input
            localStorage.setItem('isLoggedIn', 'true');
            
            // Simple demo logic - in real app, this would validate with backend
            if (identifier.toLowerCase().includes('patient')) {
                localStorage.setItem('userType', 'patient');
                window.location.href = 'patient-dashboard.html';
            } else if (identifier.toLowerCase().includes('clinic')) {
                localStorage.setItem('userType', 'clinic');
                window.location.href = 'clinic-dashboard.html';
            } else {
                localStorage.setItem('userType', 'doctor');
                window.location.href = 'clinic-dashboard.html';
            }
        }

        function demoLogin(type) {
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('userType', type);
            if (type === 'patient') {
                window.location.href = 'patient-dashboard.html';
            } else {
                window.location.href = 'clinic-dashboard.html';
            }
        }
    </script>
</body>
</html>
